<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ঈদ মোবারক ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{
overflow:hidden;
background:#000;
color:#fff;
height:100vh;
}

/* ================= BACKGROUND ================= */

.bg{
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.88)),
url('https://images.unsplash.com/photo-1519817650390-64a93db51149?q=80&w=1400&auto=format&fit=crop');
background-size:cover;
background-position:center;
animation:bgZoom 20s linear infinite alternate;
z-index:-5;
}

@keyframes bgZoom{
from{
transform:scale(1);
}
to{
transform:scale(1.15);
}
}

/* ================= PARTICLES ================= */

.particles span{
position:absolute;
display:block;
width:3px;
height:3px;
background:#ffd700;
border-radius:50%;
box-shadow:0 0 10px #ffd700;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-100vh) scale(1.5);
opacity:0;
}
}

/* ================= GLOW ================= */

.glow{
position:absolute;
width:500px;
height:500px;
background:#ffd700;
border-radius:50%;
filter:blur(180px);
opacity:.18;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:pulse 4s infinite;
}

@keyframes pulse{
50%{
transform:translate(-50%,-50%) scale(1.1);
opacity:.28;
}
}

/* ================= MOON ================= */

.moon{
position:absolute;
top:50px;
right:50px;
width:90px;
height:90px;
border-radius:50%;
box-shadow:-25px 0 0 #ffd700;
animation:moonFloat 4s ease-in-out infinite;
}

@keyframes moonFloat{
50%{
transform:translateY(-12px);
}
}

/* ================= MAIN ================= */

.main{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:400px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
border-radius:35px;
padding:35px 25px;
text-align:center;
box-shadow:
0 0 25px rgba(255,215,0,.25),
0 0 60px rgba(255,215,0,.12);
animation:cardShow 1s ease;
}

@keyframes cardShow{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.title{
font-size:38px;
font-weight:700;
color:#ffd700;
text-shadow:0 0 15px rgba(255,215,0,.8);
margin-bottom:12px;
animation:glowText 2s infinite alternate;
}

@keyframes glowText{
from{
text-shadow:0 0 10px rgba(255,215,0,.4);
}
to{
text-shadow:0 0 25px rgba(255,215,0,1);
}
}

.subtitle{
font-size:17px;
line-height:1.7;
color:#eee;
margin-bottom:25px;
}

/* ================= INPUT ================= */

.input-box{
position:relative;
margin-bottom:20px;
}

input{
width:100%;
padding:16px;
background:rgba(255,255,255,.07);
border:2px solid rgba(255,215,0,.35);
outline:none;
border-radius:16px;
font-size:18px;
color:#fff;
transition:.3s;
}

input:focus{
border-color:#ffd700;
box-shadow:0 0 20px rgba(255,215,0,.5);
}

input::placeholder{
color:#ccc;
}

/* ================= BUTTON ================= */

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ffd700,#ffb300);
color:#000;
font-size:20px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px rgba(255,215,0,.45);
}

.btn:hover{
transform:scale(1.04);
}

/* ================= RESULT ================= */

.result{
display:none;
margin-top:28px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.name{
font-size:34px;
color:#ffd700;
font-weight:700;
margin-bottom:12px;
text-shadow:0 0 15px rgba(255,215,0,.7);
}

.message{
font-size:22px;
line-height:1.9;
margin-bottom:25px;
}

.share{
background:#25D366;
color:#fff;
box-shadow:0 0 25px rgba(37,211,102,.55);
margin-top:10px;
}

/* ================= FOOTER ================= */

.footer{
margin-top:28px;
font-size:14px;
color:#aaa;
}

/* ================= MUSIC VISUALIZER ================= */

.visualizer{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
margin-top:25px;
height:40px;
}

.visualizer span{
width:6px;
background:#ffd700;
border-radius:10px;
animation:bounce 1s infinite ease-in-out;
box-shadow:0 0 12px #ffd700;
}

.visualizer span:nth-child(1){height:15px;animation-delay:.1s;}
.visualizer span:nth-child(2){height:30px;animation-delay:.2s;}
.visualizer span:nth-child(3){height:20px;animation-delay:.3s;}
.visualizer span:nth-child(4){height:35px;animation-delay:.4s;}
.visualizer span:nth-child(5){height:18px;animation-delay:.5s;}

@keyframes bounce{
50%{
transform:scaleY(1.8);
}
}

/* ================= RESPONSIVE ================= */

@media(max-width:480px){

.title{
font-size:32px;
}

.message{
font-size:19px;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="moon"></div>

<div class="particles">
<span style="left:10%;animation-duration:8s"></span>
<span style="left:20%;animation-duration:12s"></span>
<span style="left:35%;animation-duration:7s"></span>
<span style="left:50%;animation-duration:10s"></span>
<span style="left:65%;animation-duration:14s"></span>
<span style="left:80%;animation-duration:9s"></span>
<span style="left:90%;animation-duration:13s"></span>
</div>

<div class="main">

<div class="card">

<div class="title">ঈদ মোবারক ✨</div>

<div class="subtitle">
তোমার নাম লিখে সুন্দর ইসলামিক ঈদ শুভেচ্ছা তৈরি করো 🌙
</div>

<div class="input-box">
<input type="text" id="name" placeholder="তোমার নাম লিখো...">
</div>

<button class="btn" onclick="showWish()">
শুভেচ্ছা দেখো
</button>

<div class="result" id="result">

<div class="name" id="showName"></div>

<div class="message" id="message"></div>

<button class="btn share" onclick="shareNow()">
WhatsApp এ শেয়ার করো
</button>

<div class="visualizer">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

<div class="footer">
Created By RJ RIAZ
</div>

</div>

</div>

<!-- ================= AUDIO ================= -->

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/20/audio_49f4e3f4d3.mp3?filename=ramadan-kareem-background-143092.mp3" type="audio/mp3">
</audio>

<!-- ================= SCRIPT ================= -->

<script>

const wishes = [

"🌙 এই পবিত্র ঈদ তোমার জীবনে নিয়ে আসুক অফুরন্ত সুখ, শান্তি ও রহমত ✨",

"🕌 আল্লাহ তোমার সব দোয়া কবুল করুন এবং জীবন ভরে তুলুন নূরে 💛",

"💫 ঈদের আনন্দ ছড়িয়ে পড়ুক তোমার পরিবার ও হৃদয়ে 🌙",

"✨ তোমার প্রতিটি দিন হোক খুশি, ভালোবাসা ও সফলতায় ভরা 🕌",

"🌙 ঈদ মোবারক! আল্লাহ তোমাকে সুস্থতা, শান্তি ও বরকত দান করুন 💖"

];

function showWish(){

let name = document.getElementById("name").value;

if(name == ""){

alert("তোমার নাম লিখো!");

return;

}

let randomWish = wishes[Math.floor(Math.random()*wishes.length)];

document.getElementById("showName").innerHTML = name;

document.getElementById("message").innerHTML = randomWish;

document.getElementById("result").style.display = "block";

document.getElementById("music").play();

}

function shareNow(){

let name = document.getElementById("showName").innerText;

let msg = document.getElementById("message").innerText;

let shareText =
"🌙 ঈদ মোবারক ✨\n\n" +
name + "\n\n" +
msg +
"\n\n🕌 তোমাকেও জানাই পবিত্র ঈদের শুভেচ্ছা 💛";

let url =
"https://wa.me/?text=" + encodeURIComponent(shareText);

window.open(url,'_blank');

}

</script>

</body>
</html>
